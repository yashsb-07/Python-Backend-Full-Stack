<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>My Dashboard</h2>
            <ul>
                <li>Dashboard</li>
                <li>Users</li>
                <li>Analytics</li>
                <li>Settings</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Dashboard Overview</h1>
            </header>

            <div class="cards">
                <div class="card users">
                    <h3>Total Users</h3>
                    <p>1,245</p>
                </div>

                <div class="card sales">
                    <h3>Sales</h3>
                    <p>$8,430</p>
                </div>

                <div class="card orders">
                    <h3>Orders</h3>
                    <p>320</p>
                </div>
            </div>

            <div class="table-section">
                <h3>Recent Activity</h3>
                
                <table>
                    <tr>
                        <th>Users</th>
                        <th>Action</th>
                        <th>Date</th>
                    </tr>

                    <tr>
                        <td>Yash</td>
                        <td>Registered</td>
                        <td>March 14</td>
                    </tr>

                    <tr>
                        <td>Sakshi</td>
                        <td>Purchased Plan</td>
                        <td>May 12</td>
                    </tr>

                    <tr>
                        <td>Ritika</td>
                        <td>Updated Profile</td>
                        <td>June 16</td>
                    </tr>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
