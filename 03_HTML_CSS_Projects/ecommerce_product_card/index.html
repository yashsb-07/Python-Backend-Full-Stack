<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-card">
        <span class="badge">20% OFF</span>
        <img src="img/samsung s23.jpg" alt="samsung phone">
        <h2>Samsung S23</h2>

        <div class="rating">
            ⭐⭐⭐⭐☆
        </div>

        <div class="price">
            <span class="new-price">₹79,899</span>
            <span class="old-price">₹85,999</span>
        </div>

        <button>Add to Cart</button>
    </div>
</body>
</html>
