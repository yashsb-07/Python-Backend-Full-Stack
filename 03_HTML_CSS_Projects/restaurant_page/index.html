<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Our Delious Menu</h1>

    <div class="menu">
        <div class="card">
            <img src="imgs/pizza.jpg" alt="pizza">
            <h3>Pizza</h3>
            <p>Cheesy delicious Italian pizza.</p>
            <span>₹250</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="imgs/burger.jpg" alt="burger">
            <h3>Burger</h3>
            <p>Juicy grilled burger with cheese.</p>
            <span>₹150</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="imgs/momos.jpg" alt="momos">
            <h3>Momos</h3>
            <p>Cripsy white sause momos.</p>
            <span>₹330</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="imgs/dessert.jpg" alt="dessert">
            <h3>Dessert</h3>
            <p>Sweet chocolate dessert.</p>
            <span>₹120</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="imgs/noodles.jpg" alt="noodles">
            <h3>Noodels</h3>
            <p>Spicy asian noodels.</p>
            <span>₹200</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="imgs/sandwich.jpg" alt="sandwich">
            <h3>Sandwich</h3>
            <p>Fresh vegetable sandwich.</p>
            <span>₹80</span>
            <button>Order Now</button>
        </div>
    </div>
</body>
</html>
